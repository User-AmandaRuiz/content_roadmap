const LEVELS = ['All','A1','A2','B1','B2','C1'];
const TYPES  = ['All','Reels','Carousel','Story','Challenge'];
const TABS   = [
  { id:'strategy',   label:'Strategy',   icon:'🎯' },
  { id:'production', label:'Production', icon:'🎬' },
  { id:'classroom',  label:'Classroom',  icon:'📖' }
];

let selectedLevel = 'All';
let selectedType  = 'All';
let activeItem    = DATA[0];
let activeTab     = 'strategy';

function filtered() {
  return DATA.filter(d =>
    (selectedLevel === 'All' || d.level === selectedLevel) &&
    (selectedType  === 'All' || d.type  === selectedType)
  );
}

function copyText(text) {
  navigator.clipboard.writeText(text).catch(() => {});
}

function renderFilters() {
  const lf = document.getElementById('level-filters');
  const tf = document.getElementById('type-filters');
  lf.innerHTML = LEVELS.map(l => `<button class="btn btn-level${selectedLevel===l?' active':''}" onclick="setLevel('${l}')">${l}</button>`).join('');
  tf.innerHTML = TYPES.map(t => `<button class="btn btn-type${selectedType===t?' active':''}" onclick="setType('${t}')">${t}</button>`).join('');
}

function renderList() {
  const list = document.getElementById('post-list');
  const items = filtered();
  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>Nenhum post encontrado para essa combinação.</p></div>`;
    return;
  }
  list.innerHTML = items.map(d => `
    <div class="post-card${activeItem&&activeItem.id===d.id?' active':''}" onclick="selectItem(${d.id})">
      <div class="post-meta">
        <span class="post-day">${d.day}</span>
        <div class="post-tags">
          <span class="tag tag-level">${d.level}</span>
          <span class="tag tag-type">${d.type}</span>
        </div>
      </div>
      <div class="post-title">${d.title}</div>
      <div class="post-focus">${d.focus}</div>
    </div>
  `).join('');
}

function renderTabs() {
  document.getElementById('tab-bar').innerHTML = TABS.map(t => `
    <button class="tab-btn${activeTab===t.id?' active':''}" onclick="setTab('${t.id}')">${t.icon} ${t.label}</button>
  `).join('');
}

function renderDetail() {
  if (!activeItem) return;
  const d = activeItem;
  document.getElementById('footer-level').textContent = `Target Audience: ${d.level} Learners`;
  let html = '';

  if (activeTab === 'strategy') {
    html = `
      <div class="section">
        <div class="section-title s-blue">💬 Captions & Hooks</div>
        <div class="block">
          <div class="field-label">Hook Line</div>
          <div class="hook-text">"${d.hook}"</div>
          <div class="sep"></div>
          <div class="field-row"><span class="field-label">Caption (EN)</span><button class="copy-btn en" onclick="copyText('${d.captionEn.replace(/'/g,"\\'")}')">Copy</button></div>
          <div class="caption-en">"${d.captionEn}"</div>
          <div class="sep"></div>
          <div class="field-row"><span class="field-label">Translation (PT)</span><button class="copy-btn pt" onclick="copyText('${d.captionPt.replace(/'/g,"\\'")}')">Copy</button></div>
          <div class="caption-pt">"${d.captionPt}"</div>
        </div>
      </div>
      <div class="section">
        <div class="section-title s-pink">⚠️ Pitfall Warning</div>
        <div class="warning-block"><div class="warning-text">"${d.commonError}"</div></div>
      </div>
      <div class="section">
        <div class="section-title s-slate">⚡ Topic Hashtags</div>
        <div class="hashtag-list">${d.hashtags.map(h => `<span class="hashtag">${h}</span>`).join('')}</div>
      </div>
    `;
  } else if (activeTab === 'production') {
    html = `
      <div class="section">
        <div class="section-title s-purple">🎥 Director's Notes</div>
        <div class="block"><p style="font-size:13px;color:#e2e8f0;font-weight:700;line-height:1.6;">${d.production}</p></div>
      </div>
      <div class="section">
        <div class="section-title s-yellow">🎵 Audio Recommendation</div>
        <div class="audio-row"><span class="audio-icon">🎵</span><span class="audio-label">${d.audioVibe}</span></div>
      </div>
    `;
  } else {
    html = `
      <div class="class-block cb-blue"><div class="cb-label cbl-blue">Warm-up Activity</div><div class="cb-text">${d.warmup}</div></div>
      <div class="class-block cb-purple"><div class="cb-label cbl-purple">Main Task</div><div class="cb-text">${d.speaking}</div></div>
      <div class="class-block cb-green"><div class="cb-label cbl-green">Follow-up</div><div class="cb-text">${d.writing}</div></div>
    `;
  }
  document.getElementById('tab-content').innerHTML = html;
}

function setLevel(l) { selectedLevel = l; syncActiveItem(); renderFilters(); renderList(); renderDetail(); }
function setType(t)  { selectedType  = t; syncActiveItem(); renderFilters(); renderList(); renderDetail(); }
function setTab(t)   { activeTab = t; renderTabs(); renderDetail(); }
function selectItem(id) { activeItem = DATA.find(d => d.id === id); renderList(); renderTabs(); renderDetail(); }

function syncActiveItem() {
  const items = filtered();
  if (items.length && !items.find(d => d.id === activeItem?.id)) activeItem = items[0];
}

function init() {
  renderFilters();
  renderList();
  renderTabs();
  renderDetail();
}

init();
</script>
